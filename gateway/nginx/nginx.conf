# --- שער לאפליקציית הליבה שלך (Core) ---
server {
    listen 443 ssl;
    server_name core.fcms.local;
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
        proxy_pass http://core:3000; # מפנה לקונטיינר ה-Node של הליבה שלך בשם השירות שלו
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- שער לפורום הקהילתי (NodeBB) ---
server {
    listen 443 ssl;
    server_name forum.fcms.local;
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
        proxy_pass http://nodebb:4567;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # תמיכה ב-WebSockets בזמן אמת עבור הפורום
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}