services:
  # --- Reverse Proxy (שער הכניסה המאובטח והניתוב) ---
  dns-server:
    image: jpillora/dnsmasq
    container_name: c_dns_server
    volumes:
      - ./gateway/dns/dnsmasq.conf:/etc/dnsmasq.conf
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: c_nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/cart/cert.pem:/etc/nginx/certs/cert.pem:ro
      - ./gateway/cart/key.pem:/etc/nginx/certs/key.pem:ro
    depends_on:
      - wordpress
      - mediawiki
      - keycloak
      - nodebb
      - core
    networks:
      - corinthian-net

  # --- בסיס נתונים מרכזי (MariaDB) ---
  db:
    image: mariadb:10.6
    container_name: corinthian-db-1
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress_db
    volumes:
      - db_data:/var/lib/mysql
      - ./setup/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - corinthian-net

  # --- שרת זהויות וניהול משתמשים (Keycloak) ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_corinthian
    command: start-dev
    environment:
      KC_DB: mariadb
      KC_DB_URL: jdbc:mariadb://corinthian-db-1:3306/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: root_password
      KC_HOSTNAME: ${DOMAIN_SSO} # עודכן דינמית
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded 
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      - db
    volumes:
      # שיתוף קובץ ההגדרות הדינמי שנוצר על ידי סקריפט הסטאפ
      - ./setup/keycloak-realm-dynamic.json:/opt/keycloak/providers/keycloak-realm-dynamic.json
    networks:
      - corinthian-net
    restart: unless-stopped

  # --- פלטפורמת הארכיון הראשית (WordPress) ---
  wordpress:
    image: wordpress:latest
    container_name: c_wordpress
    environment:
      WORDPRESS_DB_HOST: corinthian-db-1
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root_password
      WORDPRESS_DB_NAME: wordpress_db
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'https://${DOMAIN_ARCHIVE}');
        define('WP_SITEURL', 'https://${DOMAIN_ARCHIVE}');
      SSL_CERT_FILE: /etc/ssl/certs/netfree-ca.crt # פותר את חסימת נטפרי בהורדת תוספים
    extra_hosts:
      - "${DOMAIN_SSO}:host-gateway"
      - "${DOMAIN_ARCHIVE}:host-gateway"
      - "${DOMAIN_CORE}:host-gateway"
    volumes:
      - wp_data:/var/www/html
      - ./gateway/cart/netfree-ca.crt:/var/www/html/wp-includes/certificates/ca-bundle.crt:ro # הזרקת תעודת נטפרי
    networks:
      - corinthian-net

  # --- האנציקלופדיה הקהילתית (MediaWiki) ---
  mediawiki:
    image: mediawiki:latest
    container_name: c_mediawiki
    depends_on:
      - db
    volumes:
      - ./content_engines/mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php
      - ./content_engines/mediawiki/extensions:/var/www/html/extensions 
      - mw_images:/var/www/html/images
      - ./gateway/cart/netfree-ca.crt:/etc/ssl/certs/netfree-ca.crt:ro
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/netfree-ca.crt
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - corinthian-net
    extra_hosts:
      - "${DOMAIN_SSO}:host-gateway"
      - "${DOMAIN_ARCHIVE}:host-gateway"
      - "${DOMAIN_CORE}:host-gateway"

  # --- אפליקציית הניהול והסינכרון הפנימית (Corinthian Core) ---
  core:
    image: node:18-alpine
    container_name: corinthian_core
    working_dir: /usr/src/app
    volumes:
      - ./core:/usr/src/app               
      - /usr/src/app/node_modules         
    command: sh -c "npm install && npm install nodemon && npx nodemon -L app.js"
    extra_hosts:
      - "${DOMAIN_SSO}:host-gateway"
      - "${DOMAIN_ARCHIVE}:host-gateway"
      - "${DOMAIN_CORE}:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - corinthian-net

  # --- בסיס הנתונים של הפורום (Redis) ---
  nodebb-db:
    image: redis:7-alpine
    container_name: c_nodebb_db
    restart: always
    volumes:
      - nodebb_redis_data:/data
    networks:
      - corinthian-net

  # --- הפורום הקהילתי בזמן אמת (NodeBB) ---
  nodebb:
    image: nodebb/docker:latest
    container_name: c_nodebb
    restart: always
    environment:
      - URL=https://${DOMAIN_FORUM} # עודכן דינמית
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/netfree-ca.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/netfree-ca.crt
      - NODE_OPTIONS=--tls-cipher-list=DEFAULT@SECLEVEL=1 --unhandled-rejections=strict
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    extra_hosts:
      - "${DOMAIN_SSO}:host-gateway"
      - "${DOMAIN_FORUM}:host-gateway"
    volumes:
      - ./content_engines/nodebb/custom_plugins:/usr/src/app/custom_plugins
      - ./content_engines/nodebb/assets:/usr/src/app/public/uploads
      - ./content_engines/nodebb/config/config.json:/usr/src/app/config.json
      - ./gateway/cart/netfree-ca.crt:/etc/ssl/certs/netfree-ca.crt:ro
    depends_on:
      - nodebb-db
    networks:
      - corinthian-net

networks:
  corinthian-net:
    driver: bridge

volumes:
  db_data:
  wp_data:
  mw_images:
  nodebb_redis_data: